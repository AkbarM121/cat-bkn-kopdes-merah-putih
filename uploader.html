<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Upload Soal Firebase</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:40px;
}

.box{
max-width:800px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
}

textarea{
width:100%;
height:350px;
padding:10px;
}

button{
padding:15px;
background:red;
color:white;
border:none;
cursor:pointer;
margin-top:15px;
}
</style>

</head>

<body>

<div class="box">

<h2>UPLOAD SOAL FIREBASE</h2>

<textarea id="jsonInput"></textarea>

<br>

<button onclick="uploadSoal()">UPLOAD</button>

<div id="status"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBQ2a2tGLh8VDWr8PwXl7o4F_j6NBimPag",
  authDomain: "cat-kopdes.firebaseapp.com",
  projectId: "cat-kopdes"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.uploadSoal = async function(){

let text = document.getElementById("jsonInput").value;

let data = JSON.parse(text);

for(let i=0;i<data.length;i++){

await addDoc(collection(db,"bank_soal"),{

q:data[i].q,
a:data[i].a,
k:data[i].k

});

document.getElementById("status").innerHTML =
`Upload ${i+1} / ${data.length}`;

}

document.getElementById("status").innerHTML =
"✅ Upload selesai";

}

</script>

</body>
</html>
